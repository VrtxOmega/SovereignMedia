<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Media Remote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="remote-container">
        <!-- Header -->
        <div class="header">
            <span class="logo">Ω Sovereign</span>
            <span id="connection-status" class="status connected"></span>
        </div>

        <!-- Cover Art Area -->
        <div class="cover-area">
            <img id="media-cover" src="" alt="No Media" style="display: none;">
            <div id="media-placeholder" class="placeholder">
                Ω
            </div>
        </div>

        <!-- Meta Info -->
        <div class="meta-info">
            <h2 id="media-title">Not Playing</h2>
            <p id="media-artist">Sovereign Media</p>
        </div>

        <!-- Seek Bar -->
        <div class="progress-container">
            <span id="time-current">0:00</span>
            <input type="range" id="seek-slider" class="styled-slider" min="0" max="100" value="0">
            <span id="time-total">0:00</span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-secondary" id="btn-prev">⏮</button>
            <button class="btn btn-primary" id="btn-play-pause">▶</button>
            <button class="btn btn-secondary" id="btn-next">⏭</button>
        </div>

        <!-- Volume -->
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="vol-slider" class="styled-slider" min="0" max="1" step="0.01" value="1">
            <span>🔊</span>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="remote.js"></script>
</body>
</html>
